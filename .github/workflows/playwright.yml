name: Playwright Tests

# КОЛИ запускати тести? (При кожному пуші в гілку main або master)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    # ЯКИЙ комп'ютер нам потрібен? (Остання версія Ubuntu)
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # ЩО саме треба зробити? (Кроки)
    steps:
      # 1. Завантажити твій код з GitHub на цю віртуальну машину
      - uses: actions/checkout@v4

      # 2. Встановити Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 3. Встановити всі залежності (npm install)
      - name: Install dependencies
        run: npm ci

      # 4. Встановити браузери Playwright
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5. ЗАПУСТИТИ ТЕСТИ!
      - name: Run Playwright tests
        run: npx playwright test
        # Передаємо секрети з GitHub у змінні оточення (process.env)
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          UI_BASE_URL: ${{ secrets.UI_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      # 6. Зберегти HTML-звіт (навіть якщо тести впали - if: always)
      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
